            const oscillator = audioCtx.createOscillator();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'correct') {
                oscillator.type = 'sine';

            }
        };

                            ${isUnlocked ? 'bg-gradient-to-br from-teal-400 to-blue-500 text-white cursor-pointer' : 'bg-gray-200 border-gray-300 text-gray-400 cursor-not-allowed grayscale'}
                          `}
                        >
                          {isUnlocked ? (
                            <span className="font-extrabold text-2xl md:text-3xl drop-shadow-md">{pos.level}</span>
                          ) : (
                            <Icons.Lock className="w-6 h-6 md:w-8 md:h-8 opacity-50" />
                          )}
                          <div className="absolute -bottom-10 left-1/2 transform -translate-x-1/2 bg-white px-3 py-1.5 rounded-full text-xs md:text-sm font-bold whitespace-nowrap shadow-md border-2 text-gray-700 opacity-0 group-hover/btn:opacity-100 transition-opacity pointer-events-none">
                            {LEVEL_DATA[pos.level].title}
                          </div>
                        </button>
                      );
                    })}

                    {isCompleted && (
                      <button onClick={onFinish} className="absolute bottom-8 right-8 md:bottom-12 md:right-12 bg-gradient-to-r from-yellow-400 to-orange-500 text-white font-bold py-4 px-8 md:py-5 md:px-10 rounded-full shadow-lg flex items-center gap-3 animate-pulse z-30 transform hover:scale-105 transition text-base md:text-xl">
                        <Icons.Award className="w-6 h-6 md:w-8 md:h-8" /> <span>Sertifikat</span>
                      </button>
                    )}
                  </div>
                </div>
            );
        }

        // --- LEVEL 1: SUMATERA (Drag & Drop with Check Button) ---
        function Level1Sumatera({ onComplete, onCorrect }) {
            const data = LEVEL_DATA[1];
            const shuffledItems = useMemo(() => shuffleArray(data.items), [data.items]);
            const shuffledTargets = useMemo(() => shuffleArray(data.targets), [data.targets]);
            
            const [droppedItems, setDroppedItems] = useState({}); 
            const [completed, setCompleted] = useState(false);
            const [dragOverTarget, setDragOverTarget] = useState(null);
            const [selectedItem, setSelectedItem] = useState(null);
            const [feedbackMsg, setFeedbackMsg] = useState("");

            const handleDragStart = (e, item) => {
                e.dataTransfer.setData("item", JSON.stringify(item));
            };

            const handleDragOver = (e, targetId) => { e.preventDefault(); setDragOverTarget(targetId); };
            const handleDragLeave = (e) => { e.preventDefault(); setDragOverTarget(null); }
            const handleDrop = (e, target) => {
                e.preventDefault(); 
                setDragOverTarget(null);
                const itemData = e.dataTransfer.getData("item");
                if (itemData) {
                    const item = JSON.parse(itemData);
                    setDroppedItems(prev => ({ ...prev, [item.id]: target.id }));
                    setFeedbackMsg("");
                }
            };

            const handleRemoveItem = (itemId) => {
                setDroppedItems(prev => {
                    const newItems = { ...prev };
                    delete newItems[itemId];
                    return newItems;
                });
                setFeedbackMsg("");
            };

            const handleItemClick = (item) => {
                setSelectedItem(selectedItem?.id === item.id ? null : item);
            };

            const handleTargetClick = (target) => { 
                if (selectedItem) {
                    setDroppedItems(prev => ({ ...prev, [selectedItem.id]: target.id }));
                    setSelectedItem(null);
                    setFeedbackMsg("");
                } 
            };

            const handleCheckAnswer = () => {
                let isAllCorrect = true;
                data.items.forEach(item => {
                    if (droppedItems[item.id] !== item.matchId) {
                        isAllCorrect = false;
                    }
                });

                if (isAllCorrect) {
                    playSfx('correct');
                    for(let i=0; i<6; i++) { if (onCorrect) onCorrect(); }
                    setCompleted(true);
                } else {
                    playSfx('incorrect');
                    setFeedbackMsg("Hmm, sepertinya masih ada yang belum pas lokasinya. Silakan periksa dan pindahkan lagi!");
                }
            };

            const allItemsDropped = Object.keys(droppedItems).length === data.items.length;

            return (
                <div className="space-y-5 max-w-5xl mx-auto pb-8">
                  {!completed ? (
                    <div className="animate-fade-in">
                        <div className="bg-yellow-100 p-4 rounded-xl border-l-4 border-yellow-500 text-center text-sm md:text-base font-bold text-yellow-800 mb-5 shadow-sm">
                            💡 {data.instruction}
                        </div>
                        <div className="flex flex-col md:flex-row gap-5">
                          <div className="flex-1 space-y-4">
                            <div className="grid grid-cols-3 md:grid-cols-2 gap-3 min-h-[180px] p-3 bg-white/50 rounded-2xl border-2 border-dashed border-gray-300">
                              {shuffledItems.map(item => (
                                !droppedItems[item.id] && (
                                  <div key={item.id} draggable onDragStart={(e) => handleDragStart(e, item)} onClick={() => handleItemClick(item)}
                                    className={`p-3 rounded-xl border-2 text-center aspect-square flex items-center justify-center cursor-grab active:cursor-grabbing select-none bg-white shadow-sm hover:shadow-md ${selectedItem?.id === item.id ? 'border-sky-400 bg-sky-50 scale-105' : 'border-gray-200'}`}
                                  >
                                    <img src={item.img} alt={item.text} className="w-full h-full object-contain pointer-events-none" />
                                  </div>
                                )
                              ))}
                              {allItemsDropped && <p className="col-span-3 md:col-span-2 text-center text-gray-400 font-bold text-base mt-6">Semua item telah diletakkan.</p>}
                            </div>
                          </div>
                          
                          <div className="flex-1 space-y-3">
                            <div className="grid grid-cols-1 gap-3">
                              {shuffledTargets.map(target => (
                                <div key={target.id} onDragOver={(e) => handleDragOver(e, target.id)} onDragLeave={handleDragLeave} onDrop={(e) => handleDrop(e, target)} onClick={() => handleTargetClick(target)}
                                  className={`w-full p-4 rounded-xl border-2 border-dashed flex justify-between items-center transition-all min-h-[80px] cursor-pointer ${dragOverTarget === target.id ? 'bg-green-100 border-green-400 scale-[1.02]' : 'bg-white/90 border-gray-300'}`}
                                >
                                  <span className="font-bold text-gray-700 text-base">{target.label}</span>
                                  <div className="flex gap-2 flex-wrap justify-end">
                                    {data.items.filter(i => droppedItems[i.id] === target.id).map(i => (
                                      <div key={i.id} title={`${i.text} (Klik untuk mengembalikan)`} onClick={(e) => { e.stopPropagation(); handleRemoveItem(i.id); }} className="w-10 h-10 bg-white rounded-lg border shadow-sm animate-pop-in cursor-pointer hover:bg-red-50 hover:border-red-300 transition-colors relative group">
                                         <img src={i.img} alt={i.text} className="w-full h-full object-contain pointer-events-none group-hover:opacity-50" />
                                         <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 pointer-events-none"><Icons.X className="w-5 h-5 text-red-500" /></div>
                                      </div>
                                    ))}
                                  </div>
                                </div>
                              ))}
                            </div>
                          </div>
                        </div>

                        {allItemsDropped && (
                            <div className="mt-8 flex flex-col items-center animate-fade-in">
                                {feedbackMsg && <p className="text-red-600 font-bold text-base md:text-lg mb-4 bg-red-100 px-5 py-3 rounded-xl border border-red-200 text-center">{feedbackMsg}</p>}
                                <button onClick={handleCheckAnswer} className="bg-gradient-to-b from-blue-500 to-blue-600 hover:from-blue-400 hover:to-blue-500 text-white font-black py-4 px-12 rounded-2xl shadow-[0_6px_0_#1d4ed8] active:shadow-none active:translate-y-2 transition-all text-xl flex items-center justify-center gap-3">
                                    <Icons.CheckCircle className="w-7 h-7" /> Cek Jawaban
                                </button>
                            </div>
                        )}
                    </div>
                  ) : (
                    <div className="bg-white/95 p-6 md:p-10 rounded-3xl shadow-xl text-center space-y-5 border border-green-100 max-w-3xl mx-auto animate-fade-in mt-4">
                      <div className="w-16 h-16 md:w-20 md:h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto text-3xl md:text-4xl shadow-inner">🎉</div>
                      <div>
                          <h3 className="text-xl md:text-3xl font-black text-green-800 uppercase tracking-wider mb-2">Luar Biasa!</h3>
                          <p className="text-base md:text-lg font-bold text-gray-700 leading-relaxed">Kamu telah menyelesaikan misi di Pulau Sumatera dengan sempurna.</p>
                      </div>
                      <button onClick={onComplete} className="bg-gradient-to-b from-green-500 to-green-600 hover:from-green-400 hover:to-green-500 text-white font-black w-full py-4 text-lg md:text-xl rounded-2xl shadow-[0_6px_0_#166534] active:shadow-none active:translate-y-2 transition-all">Lanjut Perjalanan 🚀</button>
                    </div>
                  )}
                </div>
            );
        }

        // --- LEVEL 2: JAWA (Literasi Sosial) ---
        function Level2Jawa({ onComplete, onCorrect }) {
            const data = LEVEL_DATA[2];
            const [answers, setAnswers] = useState({});
            const [step, setStep] = useState('quiz'); 
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [scoreDetails, setScoreDetails] = useState(0);

            const flatQuestions = React.useMemo(() => {
                const arr = [];
                data.parts.forEach(part => {
                    part.questions.forEach(q => {
                        const originalOptions = [...q.options];
                        const shuffledOptions = shuffleArray(originalOptions);
                        
                        let newCorrect;
                        if (q.type === 'single') {
                            newCorrect = shuffledOptions.indexOf(originalOptions[q.correct]);
                        } else {
                            newCorrect = q.correct.map(idx => shuffledOptions.indexOf(originalOptions[idx]));
                        }

                        arr.push({
                            ...q,
                            options: shuffledOptions,
                            correct: newCorrect,
                            stimulusTitle: part.stimulusTitle,
                            stimulusText: part.stimulusText
                        });
                    });
                });
                return arr;
            }, [data]);

            const currentQ = flatQuestions[currentQIndex];

            const handleSingle = (qId, optIdx) => {
                setAnswers(prev => ({ ...prev, [qId]: optIdx }));
            };

            const handleMultiple = (qId, optIdx) => {
                setAnswers(prev => {
                    const current = prev[qId] || [];
                    if (current.includes(optIdx)) {
                        return { ...prev, [qId]: current.filter(x => x !== optIdx) };
                    } else {
                        if (current.length < 2) {
                            return { ...prev, [qId]: [...current, optIdx] };
                        }
                        return prev; 
                    }
                });
            };

            const isCurrentAnswered = currentQ.type === 'single'
                ? answers[currentQ.id] !== undefined
                : (answers[currentQ.id] && answers[currentQ.id].length > 0);

            const handleNext = () => {
                if (currentQIndex < flatQuestions.length - 1) {
                    setCurrentQIndex(prev => prev + 1);
                }
            };

            const handlePrev = () => {
                if (currentQIndex > 0) {
                    setCurrentQIndex(prev => prev - 1);
                }
            };

            const handleSubmit = () => {
                let correctAns = 0;
                flatQuestions.forEach(q => {
                    const userAns = answers[q.id];
                    if (q.type === 'single') {
                        if (userAns === q.correct) correctAns++;
                    } else if (q.type === 'multiple') {
                        if (Array.isArray(userAns) && userAns.length === q.correct.length && userAns.every(val => q.correct.includes(val))) {
                            correctAns++;
                        }
                    }
                });

                if (correctAns === flatQuestions.length) playSfx('correct');
                else playSfx('incorrect');

                setScoreDetails(correctAns);
                setStep('feedback');
            };

            const handleRetry = () => {
                setAnswers({});
                setCurrentQIndex(0);
                setScoreDetails(0);
                setStep('quiz');
            };

            const handleProceed = () => {
                for(let i = 0; i < scoreDetails; i++) {
                    if (onCorrect) onCorrect();
                }
                onComplete();
            };

            if (step === 'feedback') {
                return (
                    <div className="space-y-6 max-w-5xl mx-auto pb-8 animate-fade-in">
                        
                        <div className="bg-white/95 p-8 md:p-10 rounded-3xl shadow-xl border-4 border-green-200 text-center mt-4">
                            <Icons.Award className="w-20 h-20 text-yellow-500 mx-auto animate-bounce-slow mb-3" />
                            <h3 className="text-3xl font-black text-gray-800 mb-3">Hasil Asesmen</h3>
                            <p className="text-xl font-bold text-gray-600 mb-8">Kamu menjawab <span className="text-green-600 text-4xl mx-2">{scoreDetails}</span> dari {flatQuestions.length} soal dengan benar!</p>
                            
                            <div className="space-y-5 text-left max-h-[45vh] overflow-y-auto custom-scrollbar pr-3 mb-8">
                                {flatQuestions.map((q, idx) => {
                                    const userAns = answers[q.id];
                                    let isCorrect = false;
                                    if (q.type === 'single') {
                                        isCorrect = userAns === q.correct;
                                    } else {
                                        isCorrect = Array.isArray(userAns) && userAns.length === q.correct.length && userAns.every(val => q.correct.includes(val));
                                    }

                                    return (
                                        <div key={q.id} className={`p-5 rounded-xl border-2 ${isCorrect ? 'border-green-300 bg-green-50' : 'border-red-300 bg-red-50'}`}>
                                            <div className="flex gap-4 items-start mb-3">
                                                {isCorrect ? <Icons.CheckCircle className="w-7 h-7 text-green-600 flex-shrink-0 mt-0.5" /> : <Icons.X className="w-7 h-7 text-red-600 flex-shrink-0 mt-0.5" />}
                                                <p className="font-bold text-gray-800 text-base">{q.text}</p>
                                            </div>
                                            <div className="ml-11 space-y-2 text-base">
                                                {q.options.map((opt, oIdx) => {
                                                    const isSelected = q.type === 'single' ? userAns === oIdx : (userAns || []).includes(oIdx);
                                                    const isCorrectOpt = q.type === 'single' ? q.correct === oIdx : q.correct.includes(oIdx);
                                                    
                                                    if (!isSelected && !isCorrectOpt) return null; 
                                                    
                                                    let optClass = "text-gray-600";
                                                    let icon = "•";
                                                    if (isCorrectOpt) {
                                                        optClass = "text-green-700 font-bold";
                                                        icon = "✓";
                                                    } else if (isSelected && !isCorrectOpt) {
                                                        optClass = "text-red-600 line-through";
                                                        icon = "✗";
                                                    }
                                                    
                                                    return (
                                                        <div key={oIdx} className={`flex gap-3 ${optClass}`}>
                                                            <span className="w-5">{icon}</span>
                                                            <span>{opt} {isSelected && !isCorrectOpt ? '(Jawabanmu)' : ''} {isCorrectOpt ? '(Jawaban Benar)' : ''}</span>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>

                            <div className="flex flex-col sm:flex-row gap-5 justify-center">
                                {scoreDetails < flatQuestions.length && (
                                    <button onClick={handleRetry} className="bg-yellow-500 hover:bg-yellow-600 text-white font-black py-4 px-10 rounded-2xl shadow-[0_6px_0_#ca8a04] active:shadow-none active:translate-y-2 transition-all text-lg md:text-xl flex items-center justify-center gap-3">
                                        <Icons.RefreshCcw className="w-7 h-7" /> Coba Lagi
                                    </button>
                                )}
                                <button onClick={handleProceed} className="bg-gradient-to-b from-green-500 to-green-600 hover:from-green-400 hover:to-green-500 text-white font-black py-4 px-10 rounded-2xl shadow-[0_6px_0_#15803d] active:shadow-none active:translate-y-2 transition-all text-lg md:text-xl flex items-center justify-center gap-3">
                                    Lanjut Perjalanan 🚀
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="space-y-5 md:space-y-8 max-w-6xl mx-auto pb-8">
                   <div className="bg-blue-100 text-blue-800 p-4 rounded-xl text-center font-bold text-sm md:text-base border-l-4 border-blue-500 shadow-sm flex items-center justify-center gap-3 mt-4">
                     <Icons.BookOpen className="w-5 h-5 md:w-6 md:h-6" /> Baca teks stimulus di kiri, lalu jawab soal di kanan.
                   </div>

                   <div className="bg-white/95 rounded-3xl shadow-xl border-2 border-orange-200 overflow-hidden flex flex-col md:flex-row min-h-[400px]">
                       
                       {/* Panel Kiri: Stimulus */}
                       <div className="md:w-1/2 bg-orange-50 p-5 md:p-8 border-b md:border-b-0 md:border-r border-orange-200 overflow-y-auto max-h-[300px] md:max-h-[600px] custom-scrollbar">
                           <h3 className="font-black text-orange-800 mb-4 md:mb-5 flex items-center gap-3 text-base md:text-lg">
                               {currentQ.stimulusTitle}
                           </h3>
                           <div className="text-gray-700 text-sm md:text-base whitespace-pre-wrap leading-relaxed font-medium bg-white p-4 md:p-5 rounded-2xl border border-orange-100 shadow-sm">
                               {currentQ.stimulusText}
                           </div>
                       </div>
                       
                       {/* Panel Kanan: Soal */}
                       <div className="md:w-1/2 p-5 md:p-8 space-y-5 bg-white flex flex-col relative max-h-[450px] md:max-h-[600px]">
                           <div className="text-xs md:text-sm font-bold text-gray-400 uppercase tracking-wider">Soal {currentQIndex + 1} dari {flatQuestions.length}</div>
                           <p className="font-bold text-gray-800 text-base md:text-lg leading-relaxed">{currentQ.text}</p>
                           
                           <div className="space-y-3 flex-grow overflow-y-auto pr-2 custom-scrollbar">
                               {currentQ.options.map((opt, oIdx) => {
                                   const isSelected = currentQ.type === 'single' ? answers[currentQ.id] === oIdx : (answers[currentQ.id] || []).includes(oIdx);
                                   let btnClass = `w-full text-left px-4 py-3 md:px-5 md:py-4 rounded-xl border text-sm md:text-base font-medium transition-all flex items-start gap-4 ${isSelected ? 'border-sky-500 bg-sky-50 shadow-sm ring-2 ring-sky-300' : 'border-gray-200 hover:bg-gray-50'}`;
                                   const shapeClass = currentQ.type === 'single' ? 'rounded-full' : 'rounded-md';

                                   return (
                                       <button key={oIdx} onClick={() => currentQ.type === 'single' ? handleSingle(currentQ.id, oIdx) : handleMultiple(currentQ.id, oIdx)} className={btnClass}>
                                           <div className={`mt-0.5 flex-shrink-0 w-5 h-5 md:w-6 md:h-6 border-2 ${shapeClass} flex items-center justify-center transition-colors ${isSelected ? 'border-sky-600 bg-sky-500' : 'border-gray-300 bg-white'}`}>
                                               {isSelected && (currentQ.type === 'single' ? <div className="w-2 h-2 md:w-2.5 md:h-2.5 bg-white rounded-full" /> : <Icons.CheckCircle className="w-4 h-4 md:w-5 md:h-5 text-white" />)}
                                           </div>
                                           <span className="flex-1 leading-snug">{opt}</span>
                                       </button>
                                   );
                               })}
                           </div>
                       </div>
                   </div>

                   {/* Navigasi Soal */}
                   <div className="flex justify-between items-center gap-3 md:gap-5 mt-4">
                       <button onClick={handlePrev} disabled={currentQIndex === 0} className={`py-3 px-4 md:py-4 md:px-8 rounded-2xl font-bold flex items-center gap-2 transition-all text-sm md:text-base ${currentQIndex === 0 ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-white text-gray-700 border-2 border-gray-300 hover:bg-gray-50 shadow-sm'}`}>
                           <Icons.ArrowRight className="w-5 h-5 md:w-6 md:h-6 rotate-180" /> <span className="hidden sm:inline">Sebelumnya</span>
                       </button>
                       
                       {currentQIndex < flatQuestions.length - 1 ? (
                           <button onClick={handleNext} disabled={!isCurrentAnswered} className={`py-3 px-5 md:py-4 md:px-10 rounded-2xl font-black flex items-center gap-2 transition-all text-sm md:text-base ${!isCurrentAnswered ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-gradient-to-b from-sky-400 to-sky-500 hover:from-sky-500 hover:to-sky-600 text-white shadow-[0_5px_0_#0284c7] active:shadow-none active:translate-y-1'}`}>
                               <span className="hidden sm:inline">Selanjutnya</span> <Icons.ArrowRight className="w-5 h-5 md:w-6 md:h-6" />
                           </button>
                       ) : (
                           <button onClick={handleSubmit} disabled={!isCurrentAnswered} className={`py-3 px-5 md:py-4 md:px-10 rounded-2xl font-black flex items-center gap-2 transition-all text-sm md:text-base ${!isCurrentAnswered ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-gradient-to-b from-orange-400 to-orange-500 hover:from-orange-500 hover:to-orange-600 text-white shadow-[0_5px_0_#c2410c] active:shadow-none active:translate-y-1'}`}>
                               <Icons.CheckCircle className="w-5 h-5 md:w-6 md:h-6" /> Kumpulkan
                           </button>
                       )}
                   </div>
                </div>
            );
        }

        // --- LEVEL 3: KALIMANTAN (Studi Kasus) ---
        function Level3Kalimantan({ onComplete, onCorrect }) {
            const data = LEVEL_DATA[3];
            const [answers, setAnswers] = useState({});
            const [step, setStep] = useState('quiz'); 
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [scoreDetails, setScoreDetails] = useState(0);

            const shuffledQuestions = React.useMemo(() => {
                return data.questions.map(q => {
                    const originalReasons = [...q.reasonOptions];
                    const shuffledReasons = shuffleArray(originalReasons);
                    const correctReasonText = originalReasons[q.correctReasonIndex];
                    const newCorrectReasonIndex = shuffledReasons.indexOf(correctReasonText);

                    return {
                        ...q,
                        reasonOptions: shuffledReasons,
                        correctReasonIndex: newCorrectReasonIndex
                    };
                });
            }, [data.questions]);

            const currentQ = shuffledQuestions[currentQIndex];

            const handleStatement = (qId, statement) => {
                setAnswers(prev => ({ ...prev, [qId]: { ...prev[qId], statement } }));
            };

            const handleReason = (qId, reasonIdxStr) => {
                const reasonIdx = parseInt(reasonIdxStr);
                setAnswers(prev => ({ ...prev, [qId]: { ...prev[qId], reasonIdx } }));
            };

            const isCurrentAnswered = answers[currentQ.id]?.statement !== undefined && answers[currentQ.id]?.reasonIdx !== undefined && !isNaN(answers[currentQ.id]?.reasonIdx);

            const handleNext = () => {
                if (currentQIndex < shuffledQuestions.length - 1) {
                    setCurrentQIndex(prev => prev + 1);
                }
            };

            const handlePrev = () => {
                if (currentQIndex > 0) {
                    setCurrentQIndex(prev => prev - 1);
                }
            };

            const handleSubmit = () => {
                let correctAns = 0;
                shuffledQuestions.forEach(q => {
                    const userAns = answers[q.id];
                    if (userAns && userAns.statement === q.correctStatement && userAns.reasonIdx === q.correctReasonIndex) {
                        correctAns++;
                    }
                });

                if (correctAns === shuffledQuestions.length) playSfx('correct');
                else playSfx('incorrect');

                setScoreDetails(correctAns);
                setStep('feedback');
            };

            const handleRetry = () => {
                setAnswers({});
                setCurrentQIndex(0);
                setScoreDetails(0);
                setStep('quiz');
            };

            const handleProceed = () => {
                for(let i = 0; i < scoreDetails; i++) {
                    if (onCorrect) onCorrect();
                }
                onComplete();
            };

            if (step === 'feedback') {
                return (
                    <div className="space-y-6 max-w-5xl mx-auto pb-8 animate-fade-in">
                        
                        <div className="bg-white/95 p-8 md:p-10 rounded-3xl shadow-xl border-4 border-green-200 text-center mt-4">
                            <Icons.Award className="w-20 h-20 text-yellow-500 mx-auto animate-bounce-slow mb-3" />
                            <h3 className="text-3xl font-black text-gray-800 mb-3">Hasil Studi Kasus</h3>

                                                    {!isCorrect && userAns?.reasonIdx !== q.correctReasonIndex && <span className="text-green-700 font-bold ml-2 block mt-1">✓ {q.reasonOptions[q.correctReasonIndex]}</span>}
                                                </p>

                                        <Icons.RefreshCcw className="w-7 h-7" /> Coba Lagi
                                    </button>
                                )}
                                <button onClick={handleProceed} className="bg-gradient-to-b from-green-500 to-green-600 hover:from-green-400 hover:to-green-500 text-white font-black py-4 px-10 rounded-2xl shadow-[0_6px_0_#15803d] active:shadow-none active:translate-y-2 transition-all text-lg md:text-xl flex items-center justify-center gap-3">
                                    Lanjut Perjalanan 🚀
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="space-y-5 md:space-y-8 max-w-6xl mx-auto pb-8">
                   
                   <div className="bg-blue-100 text-blue-800 p-4 rounded-xl text-center font-bold text-sm md:text-base border-l-4 border-blue-500 shadow-sm flex items-center justify-center gap-3 mt-4">
                     <Icons.BookOpen className="w-5 h-5 md:w-6 md:h-6" /> Baca teks stimulus di kiri, lalu pilih Benar/Salah dan Alasannya di kanan.
                   </div>

                   <div className="bg-white/95 rounded-3xl shadow-xl border-2 border-green-200 overflow-hidden flex flex-col md:flex-row min-h-[400px]">
                       
                       {/* Panel Kiri: Stimulus */}
                       <div className="md:w-1/2 bg-green-50 p-5 md:p-8 border-b md:border-b-0 md:border-r border-green-200 overflow-y-auto max-h-[300px] md:max-h-[600px] custom-scrollbar">
                           <h3 className="font-black text-green-800 mb-4 md:mb-5 flex items-center gap-3 text-base md:text-lg">
                               {data.stimulusTitle}
                           </h3>
                           <div className="text-gray-700 text-sm md:text-base whitespace-pre-wrap leading-relaxed font-medium bg-white p-4 md:p-5 rounded-2xl border border-green-100 shadow-sm">
                               {data.stimulusText}
                           </div>
                       </div>
                       
                       {/* Panel Kanan: Soal (Benar/Salah & Dropdown) */}
                       <div className="md:w-1/2 p-5 md:p-8 space-y-5 bg-white flex flex-col relative max-h-[450px] md:max-h-[600px]">
                           <div className="text-xs md:text-sm font-bold text-gray-400 uppercase tracking-wider">Soal {currentQIndex + 1} dari {shuffledQuestions.length}</div>
                           <p className="font-bold text-gray-800 text-base md:text-lg leading-relaxed">{currentQ.text}</p>
                           
                           <div className="space-y-5 flex-grow overflow-y-auto pr-2 custom-scrollbar mt-3">
                               <div className="space-y-3">
                                   <label className="block text-sm md:text-base font-bold text-gray-600">Pernyataan tersebut:</label>
                                   <div className="flex gap-4">
                                       <button onClick={() => handleStatement(currentQ.id, 'Benar')} className={`flex-1 py-4 rounded-xl border-2 font-bold text-base transition-all ${answers[currentQ.id]?.statement === 'Benar' ? 'bg-green-500 border-green-600 text-white shadow-inner' : 'bg-gray-50 border-gray-200 text-gray-600 hover:border-green-300 hover:bg-green-50'}`}>
                                           Benar
                                       </button>
                                       <button onClick={() => handleStatement(currentQ.id, 'Salah')} className={`flex-1 py-4 rounded-xl border-2 font-bold text-base transition-all ${answers[currentQ.id]?.statement === 'Salah' ? 'bg-red-500 border-red-600 text-white shadow-inner' : 'bg-gray-50 border-gray-200 text-gray-600 hover:border-red-300 hover:bg-red-50'}`}>
                                           Salah
                                       </button>
                                   </div>
                               </div>

                               <div className="space-y-3 pt-3 border-t border-gray-100">
                                   <label className="block text-sm md:text-base font-bold text-gray-600">Pilih Alasannya:</label>
                                   <div className="relative">
                                       <select 
                                            value={answers[currentQ.id]?.reasonIdx !== undefined ? answers[currentQ.id].reasonIdx : ""} 
                                            onChange={(e) => handleReason(currentQ.id, e.target.value)} 
                                            className="w-full p-4 md:p-5 rounded-xl border-2 border-gray-200 bg-gray-50 text-base font-medium text-gray-700 outline-none focus:border-green-400 focus:bg-white transition-all appearance-none cursor-pointer"
                                       >
                                           <option value="" disabled>-- Klik di sini untuk memilih alasan --</option>
                                           {currentQ.reasonOptions.map((opt, idx) => (
                                               <option key={idx} value={idx}>{opt}</option>
                                           ))}
                                       </select>
                                       <div className="absolute right-5 top-1/2 transform -translate-y-1/2 pointer-events-none">
                                           <Icons.ArrowRight className="w-5 h-5 text-gray-400 rotate-90" />
                                       </div>
                                   </div>
                               </div>
                           </div>
                       </div>
                   </div>

                   {/* Navigasi Soal */}
                   <div className="flex justify-between items-center gap-3 md:gap-5 mt-4">
                       <button onClick={handlePrev} disabled={currentQIndex === 0} className={`py-3 px-4 md:py-4 md:px-8 rounded-2xl font-bold flex items-center gap-2 transition-all text-sm md:text-base ${currentQIndex === 0 ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-white text-gray-700 border-2 border-gray-300 hover:bg-gray-50 shadow-sm'}`}>
                           <Icons.ArrowRight className="w-5 h-5 md:w-6 md:h-6 rotate-180" /> <span className="hidden sm:inline">Sebelumnya</span>
                       </button>
                       
                       {currentQIndex < shuffledQuestions.length - 1 ? (
                           <button onClick={handleNext} disabled={!isCurrentAnswered} className={`py-3 px-5 md:py-4 md:px-10 rounded-2xl font-black flex items-center gap-2 transition-all text-sm md:text-base ${!isCurrentAnswered ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-gradient-to-b from-sky-400 to-sky-500 hover:from-sky-500 hover:to-sky-600 text-white shadow-[0_5px_0_#0284c7] active:shadow-none active:translate-y-1'}`}>
                               <span className="hidden sm:inline">Selanjutnya</span> <Icons.ArrowRight className="w-5 h-5 md:w-6 md:h-6" />
                           </button>
                       ) : (
                           <button onClick={handleSubmit} disabled={!isCurrentAnswered} className={`py-3 px-5 md:py-4 md:px-10 rounded-2xl font-black flex items-center gap-2 transition-all text-sm md:text-base ${!isCurrentAnswered ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-gradient-to-b from-orange-400 to-orange-500 hover:from-orange-500 hover:to-orange-600 text-white shadow-[0_5px_0_#c2410c] active:shadow-none active:translate-y-1'}`}>
                               <Icons.CheckCircle className="w-5 h-5 md:w-6 md:h-6" /> Kumpulkan
                           </button>
                       )}
                   </div>
                </div>
            );
        }

        // --- LEVEL 4: SULAWESI (Paragraf Rumpang) ---
        function Level4Sulawesi({ onComplete, onCorrect }) {
            const data = LEVEL_DATA[4];
            const [droppedWords, setDroppedWords] = useState({}); 
            const [availableWords, setAvailableWords] = useState([]);
            const [selectedWord, setSelectedWord] = useState(null);
            const [dragOverBlank, setDragOverBlank] = useState(null);
            const [feedbackMsg, setFeedbackMsg] = useState("");
            const [completed, setCompleted] = useState(false);

            useEffect(() => {
                setAvailableWords(shuffleArray(data.words));
                setDroppedWords({});
            }, [data.words]);

            const handleDragStart = (e, word, sourceBlankId = null) => {
                e.dataTransfer.setData("word", JSON.stringify(word));
                e.dataTransfer.setData("source", sourceBlankId || "pool");
            };

            const handleDropOnBlank = (e, blankId) => {
                e.preventDefault();
                setDragOverBlank(null);
                const wordData = e.dataTransfer.getData("word");
                const source = e.dataTransfer.getData("source");
                
                if (wordData) {
                    const word = JSON.parse(wordData);
                    
                    setAvailableWords(prev => prev.filter(w => w.id !== word.id));
                    
                    setDroppedWords(prev => {
                        const newDropped = { ...prev };
                        if (source !== "pool" && source !== blankId) {
                            delete newDropped[source];
                        }
                        if (newDropped[blankId]) {
                             setAvailableWords(avail => [...avail, newDropped[blankId]]);
                        }
                        newDropped[blankId] = word;
                        return newDropped;
                    });
                    setFeedbackMsg("");
                    setSelectedWord(null);
                }
            };

            const handleDropOnPool = (e) => {
                e.preventDefault();
                const wordData = e.dataTransfer.getData("word");
                const source = e.dataTransfer.getData("source");
                
                if (wordData && source !== "pool") {
                    const word = JSON.parse(wordData);
                    setDroppedWords(prev => {
                        const newDropped = { ...prev };
                        delete newDropped[source];
                        return newDropped;
                    });
                    setAvailableWords(prev => {
                        if (!prev.find(w => w.id === word.id)) return [...prev, word];
                        return prev;
                    });
                    setFeedbackMsg("");
                }
            };
            
            const handleWordClick = (word) => {
                setSelectedWord(selectedWord?.id === word.id ? null : word);
            };

            const handleBlankClick = (blankId) => {
                if (selectedWord) {
                    if (droppedWords[blankId]) {
                        setAvailableWords(prev => [...prev, droppedWords[blankId]]);
                    }
                    setDroppedWords(prev => ({...prev, [blankId]: selectedWord}));
                    setAvailableWords(prev => prev.filter(w => w.id !== selectedWord.id));
                    setSelectedWord(null);
                    setFeedbackMsg("");
                } else if (droppedWords[blankId]) {
                    setAvailableWords(prev => [...prev, droppedWords[blankId]]);
                    setDroppedWords(prev => {
                        const newDropped = {...prev};
                        delete newDropped[blankId];
                        return newDropped;
                    });
                    setFeedbackMsg("");
                }
            };

            const handleCheckAnswer = () => {
                let isAllCorrect = true;
                let totalBlanks = 0;
                let filledBlanks = 0;

                data.paragraphs.forEach(p => {
                    p.sentences.forEach(s => {
                        totalBlanks++;
                        const dropped = droppedWords[s.blankId];
                        if (dropped) {
                            filledBlanks++;
                            if (dropped.text !== s.correct) {
                                isAllCorrect = false;
                            }
                        } else {
                            isAllCorrect = false;
                        }
                    });
                });

                if (filledBlanks < totalBlanks) {
                    setFeedbackMsg("Isi semua bagian rumpang terlebih dahulu ya!");
                    return;
                }

                if (isAllCorrect) {
                    playSfx('correct');
                    for(let i=0; i<5; i++) { if (onCorrect) onCorrect(); }
                    setCompleted(true);
                } else {
                    playSfx('incorrect');
                    setFeedbackMsg("Masih ada kata yang belum tepat. Silakan klik kata di paragraf untuk mengembalikannya ke kotak pilihan, lalu coba lagi!");
                }
            };

            return (
                <div className="space-y-5 md:space-y-8 max-w-6xl mx-auto pb-8 animate-fade-in">
                   
                   {!completed ? (
                       <div className="bg-white/95 rounded-3xl shadow-xl border-2 border-purple-200 overflow-hidden flex flex-col min-h-[450px] mt-4">
                           
                           {/* Panel: Rumpang (Full Width) */}
                           <div className="w-full p-5 md:p-8 flex flex-col relative max-h-[600px] md:max-h-[700px]">
                               
                               <div className="bg-purple-100 p-4 rounded-xl mb-5 text-center border-2 border-dashed border-purple-300 min-h-[100px]"
                                    onDragOver={(e) => { e.preventDefault(); }}
                                    onDrop={handleDropOnPool}
                               >
                                   <p className="text-sm font-bold text-purple-800 mb-3">PILIHAN KATA (Tarik atau Klik kata ini):</p>
                                   <div className="flex flex-wrap gap-3 justify-center">
                                       {availableWords.map(word => (
                                            <div 
                                                key={word.id} 
                                                draggable 
                                                onDragStart={(e) => handleDragStart(e, word)}
                                                onClick={() => handleWordClick(word)}
                                                className={`px-4 py-2 md:px-5 md:py-2.5 rounded-lg border-2 font-bold text-sm md:text-base cursor-grab active:cursor-grabbing shadow-sm transition-all select-none ${selectedWord?.id === word.id ? 'bg-purple-500 border-purple-600 text-white scale-105' : 'bg-white text-gray-700 border-purple-300 hover:border-purple-400 hover:bg-purple-50'}`}
                                            >
                                                {word.text}
                                            </div>
                                       ))}
                                       {availableWords.length === 0 && <span className="text-sm text-gray-500 italic mt-3">Semua kata sudah digunakan.</span>}
                                   </div>
                               </div>

                               <div className="flex-grow overflow-y-auto pr-2 custom-scrollbar space-y-5">
                                    {data.paragraphs.map(p => (
                                        <div key={p.id} className="bg-gray-50 p-5 rounded-2xl border border-gray-200">
                                            {p.title && <h4 className="text-sm font-bold text-gray-400 mb-3">{p.title}</h4>}
                                            <p className="text-base md:text-lg leading-[2.5] text-gray-800 font-medium">
                                                {p.sentences.map(s => (
                                                    <span key={s.id}>
                                                        {s.before}
                                                        <span 
                                                            onClick={() => handleBlankClick(s.blankId)}
                                                            onDragOver={(e) => { e.preventDefault(); setDragOverBlank(s.blankId); }}
                                                            onDragLeave={() => setDragOverBlank(null)}
                                                            onDrop={(e) => handleDropOnBlank(e, s.blankId)}
                                                            className={`inline-block mx-1 min-w-[120px] h-8 md:h-10 text-center align-middle rounded-lg border-b-4 cursor-pointer transition-all ${
                                                              dragOverBlank === s.blankId ? 'bg-sky-100 border-sky-400' : 'bg-gray-100 border-gray-300 border-dashed'
                                                            } ${droppedWords[s.blankId] ? 'bg-sky-500 border-sky-600 text-white font-bold shadow-inner' : ''}`}
                                                        >
                                                            {droppedWords[s.blankId] ? droppedWords[s.blankId].text : ''}
                                                        </span>
                                                        {s.after}
                                                    </span>
                                                ))}
                                            </p>
                                        </div>
                                    ))}
                               </div>

                               <div className="mt-5 flex flex-col items-center">
                                   {feedbackMsg && <p className="text-red-600 font-bold text-sm md:text-base mb-4 bg-red-100 px-5 py-3 rounded-xl border border-red-200 text-center">{feedbackMsg}</p>}
                                   <button onClick={handleCheckAnswer} className="bg-gradient-to-b from-blue-500 to-blue-600 hover:from-blue-400 hover:to-blue-500 text-white font-black py-4 px-10 rounded-2xl shadow-[0_6px_0_#1d4ed8] active:shadow-none active:translate-y-2 transition-all text-base md:text-lg flex items-center justify-center gap-3 w-full md:w-auto">
                                       <Icons.CheckCircle className="w-6 h-6" /> Cek Jawaban
                                   </button>
                               </div>
                           </div>
                       </div>
                   ) : (
                       <div className="bg-white/95 p-6 md:p-10 rounded-3xl shadow-xl text-center space-y-5 border border-green-100 max-w-3xl mx-auto animate-fade-in mt-4">
                         <div className="w-16 h-16 md:w-20 md:h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto text-3xl md:text-4xl shadow-inner">🎉</div>
                         <div>
                             <h3 className="text-xl md:text-3xl font-black text-green-800 uppercase tracking-wider mb-2">Luar Biasa!</h3>
                             <p className="text-base md:text-lg font-bold text-gray-700 leading-relaxed">Kamu telah menyelesaikan misi di Pulau Sulawesi dengan sempurna.</p>
                         </div>
                         <button onClick={onComplete} className="bg-gradient-to-b from-green-500 to-green-600 hover:from-green-400 hover:to-green-500 text-white font-black w-full py-4 text-lg md:text-xl rounded-2xl shadow-[0_6px_0_#166534] active:shadow-none active:translate-y-2 transition-all">Lanjut Perjalanan 🚀</button>
                       </div>
                   )}
                </div>
            );
        }

        // --- LEVEL 5: PAPUA (Proyek Kelompok) ---
        function Level5Papua({ onComplete, saveRef, saveData }) {
            const data = LEVEL_DATA[5];
            const [a1, setA1] = useState("");
            const [a2, setA2] = useState("");
            const [a3, setA3] = useState("");
            const [format, setFormat] = useState("");
            const [plan, setPlan] = useState("");
            const [reflection, setReflection] = useState("");
            const [submitted, setSubmitted] = useState(false);

            const handleSubmit = () => { 
                if (!a1 || !a2 || !a3 || !format || !plan) {
                    alert("Wah, sepertinya masih ada bagian Analisis atau Rencana Karya yang belum diisi. Lengkapi dulu ya!");
                    return;
                }
                
                playSfx('correct');

                saveData('final_project', {
                    'Sikap tidak baik': a1,
                    'Mengapa tidak baik': a2,
                    'Dampaknya': a3,
                    'Format Karya': format,
                    'Rencana Karya': plan
                }); 
                setSubmitted(true); 
            };

            return (
                <div className="space-y-5 max-w-6xl mx-auto pb-8">
                  {!submitted ? (
                    <div className="bg-white/95 rounded-3xl shadow-xl border-2 border-red-200 overflow-hidden flex flex-col md:flex-row min-h-[450px] animate-fade-in mt-4">
                        
                        {/* Panel Kiri: Cerita Masalah & Tampilkan Hasil */}
                        <div className="md:w-5/12 bg-red-50 p-5 md:p-8 border-b md:border-b-0 md:border-r border-red-200 overflow-y-auto max-h-[350px] md:max-h-[650px] custom-scrollbar flex flex-col">
                            <h3 className="font-black text-red-800 mb-4 md:mb-5 flex items-center gap-3 text-base md:text-lg">
                                <Icons.BookOpen className="w-5 h-5 md:w-6 md:h-6" /> {data.stimulusTitle}
                            </h3>
                            <div className="text-gray-700 text-sm md:text-base whitespace-pre-wrap leading-relaxed font-medium bg-white p-4 md:p-5 rounded-2xl border border-red-100 shadow-sm mb-6">
                                {data.stimulusText}
                            </div>

                            <div className="bg-yellow-100 p-5 rounded-2xl border-2 border-yellow-300 mt-auto">
                                <h4 className="font-black text-yellow-800 mb-2 text-sm md:text-base">{data.tasks.t3.title}</h4>
                                <p className="text-xs md:text-sm text-yellow-900 font-bold leading-relaxed">{data.tasks.t3.desc}</p>
                            </div>
                        </div>

                        {/* Panel Kanan: Form Proyek */}
                        <div className="md:w-7/12 p-5 md:p-8 space-y-6 flex flex-col relative max-h-[500px] md:max-h-[650px] overflow-y-auto custom-scrollbar">
                            
                            {/* Langkah 1: Analisis */}
                            <div className="space-y-4">
                                <div className="border-b-2 border-gray-100 pb-2">
                                    <h4 className="font-black text-gray-800 text-base md:text-lg">{data.tasks.t1.title}</h4>
                                    <p className="text-xs md:text-sm font-bold text-gray-500 mt-1">{data.tasks.t1.desc}</p>
                                </div>
                                <div className="space-y-3">
                                    <input type="text" placeholder={data.tasks.t1.q1} className="w-full p-3 md:p-4 rounded-xl border-2 border-gray-200 bg-gray-50 outline-none focus:border-red-400 focus:bg-white transition-all text-sm md:text-base font-medium" value={a1} onChange={(e) => setA1(e.target.value)} />
                                    <input type="text" placeholder={data.tasks.t1.q2} className="w-full p-3 md:p-4 rounded-xl border-2 border-gray-200 bg-gray-50 outline-none focus:border-red-400 focus:bg-white transition-all text-sm md:text-base font-medium" value={a2} onChange={(e) => setA2(e.target.value)} />
                                    <input type="text" placeholder={data.tasks.t1.q3} className="w-full p-3 md:p-4 rounded-xl border-2 border-gray-200 bg-gray-50 outline-none focus:border-red-400 focus:bg-white transition-all text-sm md:text-base font-medium" value={a3} onChange={(e) => setA3(e.target.value)} />
                                </div>
                            </div>

                            {/* Langkah 2: Solusi Kreatif */}
                            <div className="space-y-4">
                                <div className="border-b-2 border-gray-100 pb-2">
                                    <h4 className="font-black text-gray-800 text-base md:text-lg">{data.tasks.t2.title}</h4>
                                    <p className="text-xs md:text-sm font-bold text-gray-500 mt-1">{data.tasks.t2.desc}</p>
                                </div>
                                <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
                                    {data.tasks.t2.options.map(opt => (
                                        <button key={opt} onClick={() => setFormat(opt)} className={`py-3 px-2 rounded-xl border-2 font-bold text-xs md:text-sm transition-all ${format === opt ? 'border-red-500 bg-red-50 text-red-700 shadow-sm ring-1 ring-red-300' : 'border-gray-200 bg-gray-50 text-gray-600 hover:border-red-300'}`}>
                                            {opt}
                                        </button>
                                    ))}
                                </div>
                                <div className="bg-orange-50 border border-orange-200 p-3 rounded-xl">
                                    <p className="text-xs md:text-sm font-bold text-orange-800">{data.tasks.t2.requirements}</p>
                                </div>
                                <textarea rows="3" placeholder={data.tasks.t2.planLabel} className="w-full p-3 md:p-4 rounded-xl border-2 border-gray-200 bg-gray-50 outline-none focus:border-red-400 focus:bg-white transition-all text-sm md:text-base font-medium" value={plan} onChange={(e) => setPlan(e.target.value)} />
                            </div>

                            <div className="pt-4 flex justify-end">
                                <button onClick={handleSubmit} className="bg-red-500 hover:bg-red-600 text-white font-black py-4 px-10 rounded-2xl text-base md:text-lg shadow-[0_6px_0_#b91c1c] active:shadow-none active:translate-y-2 transition-all flex items-center justify-center gap-2 w-full md:w-auto">
                                    <Icons.Save className="w-5 h-5 md:w-6 md:h-6" /> Simpan Rencana Proyek
                                </button>
                            </div>
                        </div>
                    </div>
                  ) : (
                    <ReflectionSection question={data.reflection} value={reflection} onChange={setReflection} onNext={() => { saveRef(reflection); onComplete(); }} />
                  )}
                </div>
            );
        }

        // --- END SCREEN ---
        function EndScreen({ userData, correctCount, onRestart, playerName, playerSchool }) {
            const [isSaving, setIsSaving] = useState(false);
            const [saveStatus, setSaveStatus] = useState("idle"); 

            const handleSaveToGoogleSheets = async () => {
                if(!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes("MASUKKAN_URL")) return alert("URL Google Script belum dipasang.");
                setIsSaving(true);
                
                const payload = {
                    nama: playerName, sekolah: playerSchool, skor: correctCount, benar: correctCount,
                    ref1: "-", ref2: "-", ref3: "-", ref4: "-",
                    papua_masalah: userData.final_project?.['Sikap tidak baik'] || "-",
                    papua_solusi: userData.final_project ? `${userData.final_project['Format Karya']} - ${userData.final_project['Rencana Karya']}` : "-",
                    papua_kampanye: userData.final_project ? `Alasan: ${userData.final_project['Mengapa tidak baik']} | Dampak: ${userData.final_project['Dampaknya']}` : "-",
                };
                
                try {
                    await fetch(GOOGLE_SCRIPT_URL, { method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
                    setSaveStatus("success");
                } catch (error) { setSaveStatus("error"); } finally { setIsSaving(false); }
            };

            return (
                <div className="flex flex-col items-center gap-6 animate-fade-in pb-10">
                  <div className="text-center bg-white/90 p-6 md:p-8 rounded-3xl shadow-lg w-full max-w-xl border-2 border-white mt-6">
                    <Icons.Award className="w-20 h-20 md:w-24 md:h-24 text-yellow-500 mx-auto animate-bounce-slow" />
                    <h2 className="text-3xl md:text-4xl font-black text-gray-800 mt-3">SELAMAT!</h2>
                    <p className="text-base md:text-lg font-bold mt-1">{playerName}, <span className="text-sky-600">Duta Liburan Bhinneka</span></p>
                    <div className="text-xl md:text-2xl font-black text-gray-600 mt-4">
                        Menjawab Benar <br/><span className="text-4xl text-yellow-500 text-outline">{correctCount} / 21</span> Soal
                    </div>
                  </div>

                  <div className="w-full max-w-xl bg-white p-6 md:p-8 rounded-3xl shadow-2xl border-4 border-yellow-300 relative text-base">
                    <div className="text-center border-b-2 border-gray-100 pb-4 mb-4">
                      <h3 className="font-black text-xl md:text-2xl text-gray-800">SERTIFIKAT KELULUSAN</h3>
                      <p className="text-sky-600 font-bold text-lg mt-1">{playerName} - {playerSchool}</p>
                    </div>
                    <div className="space-y-3 h-40 overflow-y-auto pr-3 custom-scrollbar text-sm md:text-base">
                      <p className="bg-orange-50 p-3 rounded-lg border border-orange-100"><b className="text-orange-800 block mb-1">Refleksi Akhir:</b> "{userData.ref5 || '-'}"</p>
                      <p className="bg-red-50 p-3 rounded-lg border border-red-100"><b className="text-red-800 block mb-1">Rencana Proyek:</b> "{userData.final_project ? `${userData.final_project['Format Karya']} - ${userData.final_project['Rencana Karya']}` : '-'}"</p>
                    </div>
                  </div>

                  <div className="w-full max-w-xl space-y-3 mt-2">
                    {saveStatus === 'idle' && <button onClick={handleSaveToGoogleSheets} disabled={isSaving} className="bg-blue-600 hover:bg-blue-700 text-white font-black w-full py-4 rounded-2xl flex items-center justify-center gap-3 text-lg shadow-[0_6px_0_#1e40af] active:shadow-none active:translate-y-2 transition-all">{isSaving ? "Menyimpan..." : <><Icons.Save className="w-5 h-5 md:w-6 md:h-6"/> Simpan Nilai ke Guru</>}</button>}
                    {saveStatus === 'success' && <div className="bg-green-100 text-green-800 p-4 rounded-2xl text-center font-bold text-base border-2 border-green-300">Berhasil dikirim! ✅</div>}
                    {saveStatus === 'error' && <div className="bg-red-100 text-red-800 p-4 rounded-2xl text-center font-bold text-base border-2 border-red-300">Gagal. <button onClick={()=>setSaveStatus('idle')} className="underline text-red-600 ml-2">Coba lagi</button></div>}
                    <button onClick={onRestart} className="bg-green-500 hover:bg-green-600 text-white font-black w-full py-4 rounded-2xl flex items-center justify-center gap-3 text-lg shadow-[0_6px_0_#166534] active:shadow-none active:translate-y-2 transition-all"><Icons.RefreshCcw className="w-5 h-5 md:w-6 md:h-6"/> Main Lagi</button>
                  </div>
                </div>
            );
        }

        function ReflectionSection({ question, value, onChange, onNext }) {
            return (
                <div className="bg-white/95 p-6 md:p-10 rounded-3xl shadow-xl text-center space-y-5 border border-purple-100 max-w-3xl mx-auto animate-fade-in mt-4">
                  <div className="w-16 h-16 md:w-20 md:h-20 bg-purple-100 rounded-full flex items-center justify-center mx-auto text-2xl md:text-3xl shadow-inner">📝</div>
                  <div>
                    <h3 className="text-lg md:text-2xl font-black text-purple-800 mb-2 uppercase tracking-wider">Refleksi Akhir</h3>
                    <p className="text-base md:text-lg font-bold text-gray-700 leading-relaxed whitespace-pre-wrap">{question}</p>
                  </div>
                  <textarea value={value} onChange={(e) => onChange(e.target.value)} className="w-full p-4 md:p-5 border-2 rounded-2xl text-base md:text-lg bg-purple-50 outline-none focus:border-purple-400 h-32 md:h-40 text-gray-800 font-medium transition-colors" placeholder="Tulis jawabanmu di sini..." />
                  <button onClick={onNext} disabled={value.length < 5} className="bg-green-500 hover:bg-green-600 text-white font-black w-full py-4 text-lg md:text-xl rounded-2xl disabled:opacity-50 shadow-[0_6px_0_#166534] active:shadow-none active:translate-y-2 transition-all disabled:shadow-none disabled:translate-y-0 disabled:cursor-not-allowed">Selesaikan Petualangan 🚀</button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PetualanganBhinneka />);
    </script>
</body>
</html>
